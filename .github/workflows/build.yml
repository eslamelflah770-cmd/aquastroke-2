name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build Web Platform
        run: npm run build --workspace=@aquastroke/web

      - name: Build Admin Dashboard
        run: npm run build --workspace=@aquastroke/admin

      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Upload Admin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: apps/admin/dist
